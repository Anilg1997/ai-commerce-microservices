<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs><linearGradient id="header" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2874f0"/><stop offset="100%" stop-color="#1a5fc7"/></linearGradient></defs>
  <rect width="1200" height="800" fill="#f1f3f6"/>
  <rect width="1200" height="52" fill="url(#header)"/>
  <rect x="0" y="52" width="1200" height="36" fill="#1a5fc7"/>
  <rect x="24" y="14" width="80" height="24" rx="4" fill="white" opacity="0.9"/>
  <!-- Header -->
  <text x="400" y="120" font-size="28" font-weight="800" fill="#212121" text-anchor="middle">AI Shopping Assistant</text>
  <text x="400" y="146" font-size="14" fill="#666" text-anchor="middle" max-width="600">Powered by RAG + LangChain4j + Ollama</text>
  <!-- Chat Panel -->
  <rect x="24" y="164" width="760" height="440" rx="12" fill="white"/>
  <!-- Chat Messages -->
  <rect x="40" y="180" width="300" height="80" rx="8" fill="#f5f7fa"/>
  <text x="56" y="196" font-size="12" font-weight="700" fill="#2874f0">AI Assistant</text>
  <text x="56" y="215" font-size="13" fill="#333">Hello! I'm your AI shopping</text>
  <text x="56" y="235" font-size="13" fill="#333">assistant. How can I help you today?</text>
  <rect x="480" y="276" width="288" height="60" rx="8" fill="#e3f2fd"/>
  <text x="496" y="296" font-size="12" font-weight="700" fill="#1565c0">You</text>
  <text x="496" y="315" font-size="13" fill="#333">Find me the best laptop for Java development</text>
  <rect x="40" y="352" width="400" height="100" rx="8" fill="#f5f7fa"/>
  <text x="56" y="368" font-size="12" font-weight="700" fill="#2874f0">AI Assistant</text>
  <text x="56" y="388" font-size="13" fill="#333">Based on our catalog, I recommend the</text>
  <text x="56" y="408" font-size="13" fill="#333">AI Starter Laptop ($899): Intel i7, 32GB RAM,</text>
  <text x="56" y="428" font-size="13" fill="#333">1TB SSD, RTX 4060 - perfect for Java dev!</text>
  <!-- Chat Input -->
  <rect x="24" y="580" width="640" height="44" rx="8" fill="white" stroke="#e0e0e0"/>
  <text x="40" y="607" font-size="14" fill="#999">Ask about products, orders, or request analysis...</text>
  <rect x="672" y="580" width="96" height="44" rx="8" fill="#2874f0"/>
  <text x="720" y="607" font-size="14" font-weight="600" fill="white" text-anchor="middle">Send</text>
  <!-- Quick Action Buttons -->
  <rect x="800" y="164" width="180" height="56" rx="10" fill="white"/>
  <circle cx="832" cy="192" r="12" fill="#e3f2fd"/><text x="826" y="197" font-size="12">🔍</text>
  <text x="852" y="190" font-size="13" fill="#333">Product Search</text>
  <rect x="800" y="228" width="180" height="56" rx="10" fill="white"/>
  <circle cx="832" cy="256" r="12" fill="#fff3e0"/><text x="826" y="261" font-size="12">📊</text>
  <text x="852" y="254" font-size="13" fill="#333">Funnel Analysis</text>
  <rect x="800" y="292" width="180" height="56" rx="10" fill="white"/>
  <circle cx="832" cy="320" r="12" fill="#e8f5e9"/><text x="826" y="325" font-size="12">⚖️</text>
  <text x="852" y="318" font-size="13" fill="#333">Compare Products</text>
  <rect x="800" y="356" width="180" height="56" rx="10" fill="white"/>
  <circle cx="832" cy="384" r="12" fill="#fce4ec"/><text x="826" y="389" font-size="12">🔧</text>
  <text x="852" y="382" font-size="13" fill="#333">MCP: Dashboard</text>
</svg>
