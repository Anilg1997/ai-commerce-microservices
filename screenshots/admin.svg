  <text x="710" y="300" font-size="13" fill="#555">User → Cart</text><text x="950" y="300" font-size="18" font-weight="700" fill="#2874f0" text-anchor="end">100%</text>
  <rect x="696" y="318" width="268" height="32" rx="8" fill="#f5f7fa"/>
  <text x="710" y="338" font-size="13" fill="#555">Cart → Order</text><text x="950" y="338" font-size="18" font-weight="700" fill="#2874f0" text-anchor="end">57%</text>
  <rect x="696" y="356" width="268" height="32" rx="8" fill="#f5f7fa"/>
  <text x="710" y="376" font-size="13" fill="#555">Order → Payment</text><text x="950" y="376" font-size="18" font-weight="700" fill="#2874f0" text-anchor="end">75%</text>
  <rect x="696" y="394" width="268" height="32" rx="8" fill="#f5f7fa"/>
  <text x="710" y="414" font-size="13" fill="#555">Payment → Delivered</text><text x="950" y="414" font-size="18" font-weight="700" fill="#2874f0" text-anchor="end">57%</text>
