  <text x="248" y="136" font-size="24" font-weight="700" fill="#212121">Admin Dashboard</text>
  <rect x="248" y="152" width="130" height="70" rx="10" fill="white" style="border-left:4px solid #1565c0"/>
  <text x="313" y="182" font-size="24" font-weight="700" fill="#212121" text-anchor="middle">42</text>
