  <text x="284" y="298" font-size="12" font-weight="600" fill="white">Users: 42</text>
  <rect x="264" y="312" width="340" height="26" rx="6" fill="#2874f0" opacity="0.85"/>
  <text x="284" y="330" font-size="12" font-weight="600" fill="white">Cart: 156</text>
  <rect x="264" y="344" width="260" height="26" rx="6" fill="#2874f0" opacity="0.7"/>
  <text x="284" y="362" font-size="12" font-weight="600" fill="white">Orders: 89</text>
  <rect x="264" y="376" width="180" height="26" rx="6" fill="#2874f0" opacity="0.55"/>
