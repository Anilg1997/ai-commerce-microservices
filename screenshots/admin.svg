  <rect x="36" y="192" width="176" height="36" rx="8" fill="transparent"/>
  <text x="48" y="215" font-size="14" fill="#555">Products</text>
  <rect x="36" y="232" width="176" height="36" rx="8" fill="transparent"/>
  <text x="48" y="255" font-size="14" fill="#555">Orders</text>
  <rect x="36" y="272" width="176" height="36" rx="8" fill="transparent"/>
  <text x="48" y="295" font-size="14" fill="#555">Users</text>
