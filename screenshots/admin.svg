<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, sans-serif">
  <defs><linearGradient id="header" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2874f0"/><stop offset="100%" stop-color="#1a5fc7"/></linearGradient></defs>
  <rect width="1200" height="800" fill="#f1f3f6"/>
  <rect width="1200" height="52" fill="url(#header)"/>
  <rect x="0" y="52" width="1200" height="36" fill="#1a5fc7"/>
  <rect x="24" y="14" width="80" height="24" rx="4" fill="white" opacity="0.9"/>
  <!-- Admin Sidebar -->
  <rect x="24" y="104" width="200" height="400" rx="12" fill="white"/>
