  <rect x="390" y="152" width="130" height="70" rx="10" fill="white" style="border-left:4px solid #f9a825"/>
  <text x="455" y="182" font-size="24" font-weight="700" fill="#212121" text-anchor="middle">156</text>
  <text x="455" y="202" font-size="12" fill="#666" text-anchor="middle">Cart Adds</text>
  <rect x="532" y="152" width="130" height="70" rx="10" fill="white" style="border-left:4px solid #e65100"/>
  <text x="597" y="182" font-size="24" font-weight="700" fill="#212121" text-anchor="middle">89</text>
  <text x="597" y="202" font-size="12" fill="#666" text-anchor="middle">Orders</text>
  <rect x="674" y="152" width="130" height="70" rx="10" fill="white" style="border-left:4px solid #2e7d32"/>
  <text x="739" y="182" font-size="24" font-weight="700" fill="#212121" text-anchor="middle">67</text>
  <text x="739" y="202" font-size="12" fill="#666" text-anchor="middle">Payments</text>
  <rect x="816" y="152" width="130" height="70" rx="10" fill="white" style="border-left:4px solid #7b1fa2"/>
  <text x="881" y="182" font-size="24" font-weight="700" fill="#212121" text-anchor="middle">52</text>
  <text x="881" y="202" font-size="12" fill="#666" text-anchor="middle">Shipped</text>
  <rect x="958" y="152" width="130" height="70" rx="10" fill="white" style="border-left:4px solid #00838f"/>
  <text x="1023" y="182" font-size="24" font-weight="700" fill="#212121" text-anchor="middle">38</text>
  <text x="1023" y="202" font-size="12" fill="#666" text-anchor="middle">Delivered</text>
  <!-- Funnel Chart -->
  <rect x="248" y="236" width="420" height="200" rx="12" fill="white"/>
  <text x="264" y="266" font-size="16" font-weight="700" fill="#212121">Funnel Overview</text>
